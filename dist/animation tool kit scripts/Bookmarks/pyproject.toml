[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "maya-time-bookmarks"
version = "0.1.0"
description = "Timeline bookmark management tools for Autodesk Maya."
readme = "README.md"
requires-python = ">=3.9"
authors = [
  { name = "Your Name" }
]
license = { text = "Proprietary" }
keywords = ["maya", "animation", "timeline", "bookmarks", "pipeline"]
classifiers = [
  "Programming Language :: Python :: 3",
  "Topic :: Multimedia :: Graphics"
]

dependencies = []

[project.optional-dependencies]
# Install with: pip install -e ".[test]"
test = ["pytest>=7", "pytest-qt>=4"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
